services:
  portal_web:
    build: .
    container_name: ia_quant_portal
    command: streamlit run app_portal.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    restart: always

  robot_ia:
    build: .
    container_name: ia_quant_robot
    # MAGIA AQUÍ: Añadimos "-u" para que Python nos hable en directo por la consola
    command: python -u robot_ejecutor.py
    restart: always
